    // ----- 通用绘制函数（高性能） -----
    function resizeCanvasKeepContent(cv, c, w, h) {
        var img = null;
        if (cv.width > 0 && cv.height > 0) {
            try { img = c.getImageData(0, 0, cv.width, cv.height); } catch(e) {}
        }
        cv.width = w;
        cv.height = h;
        c.lineCap = 'round';
        c.lineJoin = 'round';
        if (img) { try { c.putImageData(img, 0, 0); } catch(e) {} }
    }

    function onPointerDown(e, c, cv) {
        e.preventDefault();
        drawing = true;
        // 缓存 rect
        cachedRect = cv.getBoundingClientRect();
        var p = getPosCached(e, cv);
        lastX = p.x; lastY = p.y;
        midX = p.x; midY = p.y;
        // 画起点圆点
        c.beginPath();
        c.arc(p.x, p.y, drawSize / 2, 0, Math.PI * 2);
        applyDrawStyle(c);
        c.fill();
    }

    function onPointerMove(e, c, cv) {
        if (!drawing) return;
        e.preventDefault();
        if (!cachedRect) cachedRect = cv.getBoundingClientRect();
        var p = getPosCached(e, cv);

        // 自动扩展画布高度：当画笔接近底部时增加画布（画布在容器内滚动，不拉长页面）
        var margin = 80;
        if (p.y + margin > cv.height) {
            extendCanvas(cv, c, p.y + margin + 200);
            // 重新缓存 rect（画布尺寸变了）
            cachedRect = cv.getBoundingClientRect();
        }

        var dist = Math.sqrt((p.x - lastX) * (p.x - lastX) + (p.y - lastY) * (p.y - lastY));
        var newMidX = (lastX + p.x) / 2;
        var newMidY = (lastY + p.y) / 2;

        if (brushType === 'brush') {
            // 毛笔：粗细随速度变化，用多段绘制模拟
            var w = getBrushWidth(dist);
            c.beginPath();
            c.moveTo(midX, midY);
            c.quadraticCurveTo(lastX, lastY, newMidX, newMidY);
            c.lineWidth = w;
            c.globalCompositeOperation = 'source-over';
            c.strokeStyle = drawColor;
            c.fillStyle = drawColor;
            c.globalAlpha = 1;
            c.lineCap = 'round';
            c.stroke();
            // 两端加点让笔触更圆润
            c.beginPath();
            c.arc(newMidX, newMidY, w / 2, 0, Math.PI * 2);
            c.fill();
        } else if (brushType === 'pencil') {
            // 铅笔：主线 + 散点纹理
            c.beginPath();
            c.moveTo(midX, midY);
            c.quadraticCurveTo(lastX, lastY, newMidX, newMidY);
            applyDrawStyle(c);
            c.stroke();
            drawPencilTexture(c, lastX, lastY, p.x, p.y);
        } else {
            // 钢笔 / 荧光笔
            c.beginPath();
            c.moveTo(midX, midY);
            c.quadraticCurveTo(lastX, lastY, newMidX, newMidY);
            applyDrawStyle(c);
            c.stroke();
        }

        midX = newMidX; midY = newMidY;
        lastX = p.x; lastY = p.y;

        // 自动滚动容器（画布在容器内滚动，页面不拉长）
        autoScrollOnDraw(cv, p.y);
    }

    // 扩展画布高度，保留已有内容
    function extendCanvas(cv, c, newHeight) {
        if (newHeight <= cv.height) return;
        resizeCanvasKeepContent(cv, c, cv.width, newHeight);
        cachedRect = null; // rect 变了，需要重新缓存
    }

    // 画笔接近底部时自动滚动容器（容器有固定高度+overflow:auto，页面不拉长）
    function autoScrollOnDraw(cv, y) {
        var body = cv.closest('.note-body') || cv.closest('.fs-draw-overlay');
        if (!body) return;
        // 直接用画布坐标 + 画布相对容器的偏移
        var cvRect = cv.getBoundingClientRect();
        var bodyRect = body.getBoundingClientRect();
        var penScreenY = cvRect.top + y - bodyRect.top + body.scrollTop;
        var margin = 100;
        if (penScreenY + margin > body.scrollTop + bodyRect.height) {
            body.scrollTop = penScreenY + margin - bodyRect.height;
        }
    }

    function onPointerUp(e) {
        if (!drawing) return;
        drawing = false;
    }

    // 应用绘制样式（笔刷类型 + 颜色 + 橡皮）
    function applyDrawStyle(c) {
        c.lineWidth = drawSize;
        if (isEraser) {
            c.globalCompositeOperation = 'destination-out';
            c.strokeStyle = 'rgba(0,0,0,1)';
            c.fillStyle = 'rgba(0,0,0,1)';
            c.globalAlpha = 1;
        } else {
            c.globalCompositeOperation = 'source-over';
            c.strokeStyle = drawColor;
            c.fillStyle = drawColor;
            // 笔刷特性
            if (brushType === 'marker') {
                // 荧光笔：半透明，可叠加
                c.globalAlpha = 0.35;
                c.lineWidth = drawSize * 2.5;
            } else if (brushType === 'pencil') {
                // 铅笔：略透明，细线
                c.globalAlpha = 0.7;
                c.lineWidth = Math.max(1, drawSize * 0.7);
            } else if (brushType === 'brush') {
                // 毛笔：完全不透明，粗细随速度变化（在 onPointerMove 中处理）
                c.globalAlpha = 1;
            } else {
                // 钢笔（默认）
                c.globalAlpha = 1;
            }
        }
    }

    // 毛笔：根据移动速度计算粗细（快=细，慢=粗）
    function getBrushWidth(dist) {
        var base = drawSize;
        var speedFactor = Math.max(0.3, 1 - dist / 50);
        return base * speedFactor * 1.5;
    }

    // 获取带透明度的颜色
    function getColorWithAlpha(color, alpha) {
        if (color.startsWith('#')) {
            var r = parseInt(color.slice(1,3), 16);
            var g = parseInt(color.slice(3,5), 16);
            var b = parseInt(color.slice(5,7), 16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        }
        return color;
    }

    // 铅笔纹理：在路径上随机散点
    function drawPencilTexture(c, x1, y1, x2, y2) {
        var dist = Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1));
        var steps = Math.ceil(dist / 2);
        c.save();
        c.globalAlpha = 0.3;
        c.fillStyle = drawColor;
        for (var i = 0; i < steps; i++) {
            var t = i / steps;
            var px = x1 + (x2 - x1) * t + (Math.random() - 0.5) * drawSize * 0.8;
            var py = y1 + (y2 - y1) * t + (Math.random() - 0.5) * drawSize * 0.8;
            c.beginPath();
            c.arc(px, py, 0.5, 0, Math.PI * 2);
            c.fill();
        }
        c.restore();
    }

    function getPosCached(e, cv) {
        var rect = cachedRect || cv.getBoundingClientRect();
        // 关键修复：把 CSS 显示坐标换算到 canvas 内部分辨率坐标
        var sx = rect.width ? cv.width / rect.width : 1;
        var sy = rect.height ? cv.height / rect.height : 1;
        return {
            x: (e.clientX - rect.left) * sx,
            y: (e.clientY - rect.top) * sy
        };
    }

        });
        // 重难点 + 深色
        document.getElementById('btnHard').addEventListener('click', function(e) {
            e.stopPropagation(); toggleHard();
        });
        document.getElementById('themeToggle').addEventListener('click', function(e) {
            e.stopPropagation(); toggleTheme();
        });
        // 测验：范围切换
        document.getElementById('quizScope').addEventListener('click', function(e) {
            var b = e.target.closest('.filter-btn');
            if (b) setQuizScope(b.getAttribute('data-qscope'));
        });
        // 测验：答题 / 下一题 / 重开 / 只练错题（事件委托）
        document.getElementById('quizBody').addEventListener('click', function(e) {
            var opt = e.target.closest('.quiz-opt');
            if (opt && !opt.disabled) { answerQuiz(parseInt(opt.getAttribute('data-opt'), 10)); return; }
            if (e.target.closest('#quizNext')) { nextQuiz(); return; }
            if (e.target.closest('#quizRestart')) { startQuiz(); return; }
            if (e.target.closest('#quizWrongOnly')) { setQuizScope('wrong'); return; }
        });
        // 辨析：易混组
        document.getElementById('groupChips').addEventListener('click', function(e) {
            var chip = e.target.closest('.group-chip');
            if (chip) loadGroup(parseInt(chip.getAttribute('data-group'), 10));
        });
        // 辨析：自由搜索
        var cmpTimer = null;
        document.getElementById('compareSearch').addEventListener('input', function() {
            clearTimeout(cmpTimer);
            cmpTimer = setTimeout(onCompareSearch, 180);
        });
        document.getElementById('compareResults').addEventListener('click', function(e) {
            var item = e.target.closest('.compare-result-item');
            if (item) addCompareItem(item.getAttribute('data-deck'), parseInt(item.getAttribute('data-idx'), 10));
        });
        document.getElementById('compareGrid').addEventListener('click', function(e) {
            var rm = e.target.closest('.cc-remove');
            if (rm) removeCompareItem(parseInt(rm.getAttribute('data-rm'), 10));
        });

        // 打字区自动增高
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            // 测验模式：1-4 选项，Enter / 空格 下一题
            if (currentMode === 'quiz') {
                if (e.key >= '1' && e.key <= '4') {
                    if (!quizState.answered) answerQuiz(parseInt(e.key, 10) - 1);
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    if (quizState.answered && document.getElementById('quizNext')) nextQuiz();
                }
                return;
            }
            if (currentMode !== 'study') return;
            if (e.key === 'ArrowLeft') prevCard();
            else if (e.key === 'ArrowRight') nextCard();
            else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
            else if (e.key === 'm' || e.key === 'M') toggleMastered();
            else if (e.key === 'd' || e.key === 'D') toggleHard();
            else if (e.key === 'n' || e.key === 'N') toggleNotePanel();
        });

        // 笔记与全屏按钮
        document.getElementById('btnNote').addEventListener('click', function(e) {
            e.stopPropagation(); toggleNotePanel();
        });
        document.getElementById('btnClearNote').addEventListener('click', function(e) {
            e.stopPropagation(); clearNote();
        });
        document.getElementById('btnEraser').addEventListener('click', function(e) {
            e.stopPropagation(); toggleEraser();
        });

        // 笔记 tab 切换
        var noteTabs = document.querySelectorAll('.note-tab');
        for (var i = 0; i < noteTabs.length; i++) {
            noteTabs[i].addEventListener('click', function(e) {
                switchNoteMode(this.getAttribute('data-mode'));
            });
        }

        // 颜色选择（右侧面板）
        var sideDots = document.querySelectorAll('#notePanel .color-dot');
        for (var i = 0; i < sideDots.length; i++) {
            sideDots[i].addEventListener('click', function(e) {
                for (var j = 0; j < sideDots.length; j++) sideDots[j].classList.remove('active');
                this.classList.add('active');
                drawColor = this.getAttribute('data-color');
                isEraser = false;
                var eb = document.getElementById('btnEraser');
                eb.classList.remove('active');
                eb.textContent = '橡皮';
                syncFsToolbar();
            });
        }

        // 颜色选择（全屏浮层）
        var fsDots = document.querySelectorAll('#fsDrawOverlay .color-dot');
        for (var i = 0; i < fsDots.length; i++) {
            fsDots[i].addEventListener('click', function(e) {
                e.stopPropagation();
                for (var j = 0; j < fsDots.length; j++) fsDots[j].classList.remove('active');
                this.classList.add('active');
                drawColor = this.getAttribute('data-color');
                isEraser = false;
                // 同步右侧
                var sd = document.querySelectorAll('#notePanel .color-dot');
                for (var k = 0; k < sd.length; k++) {
                    sd[k].classList.toggle('active', sd[k].getAttribute('data-color') === drawColor);
                }
                var eb = document.getElementById('btnEraser');
                eb.classList.remove('active');
                eb.textContent = '橡皮';
            });
        }

        // 笔触粗细（右侧）
        var sizeSlider = document.getElementById('sizeSlider');
        if (sizeSlider) {
            sizeSlider.addEventListener('input', function() {
                drawSize = parseInt(this.value, 10) || 4;
                var ss = document.getElementById('fsSizeSlider');
                if (ss) ss.value = drawSize;
            });
        }

        // 笔触粗细（全屏）
        var fsSizeSlider = document.getElementById('fsSizeSlider');
        if (fsSizeSlider) {
            fsSizeSlider.addEventListener('input', function(e) {
                e.stopPropagation();
                drawSize = parseInt(this.value, 10) || 4;
                var ss = document.getElementById('sizeSlider');
                if (ss) ss.value = drawSize;
            });
        }

        // 悬浮手写按钮
        document.getElementById('btnFsDraw').addEventListener('click', function(e) {
            e.stopPropagation(); openFsDraw();
        });
        document.getElementById('fsBtnExit').addEventListener('click', function(e) {
            e.stopPropagation(); closeFsDraw();
        });
        document.getElementById('fsBtnClear').addEventListener('click', function(e) {
            e.stopPropagation(); clearFsDraw();
        });
        document.getElementById('fsBtnEraser').addEventListener('click', function(e) {
            e.stopPropagation(); toggleFsEraser();
        });
        document.getElementById('fsBtnMinimize').addEventListener('click', function(e) {
            e.stopPropagation(); minimizeFsDraw();
        });
        document.getElementById('fsFloatingBtn').addEventListener('click', function(e) {
            e.stopPropagation(); openFsDraw();
        });

        // 笔刷选择
        var brushBtns = document.querySelectorAll('.brush-btn');
        for (var i = 0; i < brushBtns.length; i++) {
            brushBtns[i].addEventListener('click', function(e) {
                e.stopPropagation();
                selectBrush(this.getAttribute('data-brush'));
            });
        }

        // 阻止工具栏的触摸穿透到画布
        var fsToolbar = document.getElementById('fsToolbar');
        if (fsToolbar) {
            fsToolbar.addEventListener('pointerdown', function(e) { e.stopPropagation(); });
            fsToolbar.addEventListener('pointermove', function(e) { e.stopPropagation(); });
            fsToolbar.addEventListener('pointerup', function(e) { e.stopPropagation(); });
        }

        // 窗口尺寸变化重设画板
        window.addEventListener('resize', function() {
            resizeSideCanvas();
            if (document.getElementById('fsDrawOverlay').classList.contains('show')) {
                resizeFsCanvas();
            }
        });

        // 只阻止画布上的触摸滚动（允许工具栏和overlay滚动）
        var fsCanvasEl = document.getElementById('fsDrawCanvas');
        if (fsCanvasEl) {
            fsCanvasEl.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });
        }

        // 默写抽屉：关闭按钮 + 点击遮罩关闭
        var noteCloseBtn = document.getElementById('btnNoteClose');
        if (noteCloseBtn) noteCloseBtn.addEventListener('click', function(e){ e.stopPropagation(); closeNotePanel(); });
        var noteBackdropEl = document.getElementById('noteBackdrop');
        if (noteBackdropEl) noteBackdropEl.addEventListener('click', function(){ closeNotePanel(); });
    }

    function init() {
        applyAutoLevels();
        loadMastered();
        loadHard();
        loadWrong();
        loadTheme();
        renderDeckBar();
        renderFilterCounts();
        renderCard();
        bindEvents();
        initSideCanvas();
        initFsCanvas();
        setMode('study');
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
</body>
</html>
